<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CraveNest - Order</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <header>
        <img class="brand-logo" src="/static/cravenest-logo.png" alt="CraveNest logo">
        <h1>CraveNest</h1>
        <p>Cravings Delivered Instantly</p>
        <nav>
            <a href="/home">Home</a>
            <a href="/menu">Menu</a>
            <a href="/order">Order</a>
        </nav>
    </header>

    <main>
        <section class="card order-form-card">
            <h2>Place Your Order</h2>

            <form id="orderForm">
                <div class="form-grid">
                    <input id="customerName" type="text" placeholder="Your name" required>
                    <input id="phoneNumber" type="tel" placeholder="Phone number" required>
                    <textarea id="address" rows="3" placeholder="Address" required></textarea>
                </div>

                <label class="field-label" for="paymentMethod">Method of paying</label>
                <select id="paymentMethod" required>
                    <option value="">Select payment method</option>
                    <option value="Cash on Delivery">Cash on Delivery</option>
                    <option value="UPI">UPI</option>
                    <option value="Card">Card</option>
                </select>

                <h3 style="margin-top: 18px;">Select Items</h3>

                <details class="category-box" open="open">
                    <summary>Starters</summary>
                    <div class="order-options">
                        <label class="order-option">
                            <input type="checkbox" class="item-check" data-item="French Fries" data-price="100">
                            <span class="order-name">French Fries</span>
                            <span class="order-price">Rs. 100</span>
                            <input type="number" class="order-qty" min="1" value="1">
                        </label>
                        <label class="order-option">
                            <input type="checkbox" class="item-check" data-item="Cheese Balls" data-price="140">
                            <span class="order-name">Cheese Balls</span>
                            <span class="order-price">Rs. 140</span>
                            <input type="number" class="order-qty" min="1" value="1">
                        </label>
                        <label class="order-option">
                            <input type="checkbox" class="item-check" data-item="Veg Spring Roll" data-price="130">
                            <span class="order-name">Veg Spring Roll</span>
                            <span class="order-price">Rs. 130</span>
                            <input type="number" class="order-qty" min="1" value="1">
                        </label>
                        <label class="order-option">
                            <input type="checkbox" class="item-check" data-item="Garlic Bread" data-price="120">
                            <span class="order-name">Garlic Bread</span>
                            <span class="order-price">Rs. 120</span>
                            <input type="number" class="order-qty" min="1" value="1">
                        </label>
                        <label class="order-option">
                            <input type="checkbox" class="item-check" data-item="Crispy Corn" data-price="110">
                            <span class="order-name">Crispy Corn</span>
                            <span class="order-price">Rs. 110</span>
                            <input type="number" class="order-qty" min="1" value="1">
                        </label>
                    </div>
                </details>

                <details class="category-box">
                    <summary>Main Course</summary>
                    <div class="order-options">
                        <label class="order-option">
                            <input type="checkbox" class="item-check" data-item="Veg Burger" data-price="120">
                            <span class="order-name">Veg Burger</span>
                            <span class="order-price">Rs. 120</span>
                            <input type="number" class="order-qty" min="1" value="1">
                        </label>
                        <label class="order-option">
                            <input type="checkbox" class="item-check" data-item="Paneer Pizza" data-price="250">
                            <span class="order-name">Paneer Pizza</span>
                            <span class="order-price">Rs. 250</span>
                            <input type="number" class="order-qty" min="1" value="1">
                        </label>
                        <label class="order-option">
                            <input type="checkbox" class="item-check" data-item="Fried Rice" data-price="180">
                            <span class="order-name">Fried Rice</span>
                            <span class="order-price">Rs. 180</span>
                            <input type="number" class="order-qty" min="1" value="1">
                        </label>
                        <label class="order-option">
                            <input type="checkbox" class="item-check" data-item="White Sauce Pasta" data-price="200">
                            <span class="order-name">White Sauce Pasta</span>
                            <span class="order-price">Rs. 200</span>
                            <input type="number" class="order-qty" min="1" value="1">
                        </label>
                        <label class="order-option">
                            <input type="checkbox" class="item-check" data-item="Chole Bhature" data-price="150">
                            <span class="order-name">Chole Bhature</span>
                            <span class="order-price">Rs. 150</span>
                            <input type="number" class="order-qty" min="1" value="1">
                        </label>
                    </div>
                </details>

                <details class="category-box">
                    <summary>Hot Drinks</summary>
                    <div class="order-options">
                        <label class="order-option">
                            <input type="checkbox" class="item-check" data-item="Tea" data-price="40">
                            <span class="order-name">Tea</span>
                            <span class="order-price">Rs. 40</span>
                            <input type="number" class="order-qty" min="1" value="1">
                        </label>
                        <label class="order-option">
                            <input type="checkbox" class="item-check" data-item="Coffee" data-price="60">
                            <span class="order-name">Coffee</span>
                            <span class="order-price">Rs. 60</span>
                            <input type="number" class="order-qty" min="1" value="1">
                        </label>
                        <label class="order-option">
                            <input type="checkbox" class="item-check" data-item="Hot Chocolate" data-price="90">
                            <span class="order-name">Hot Chocolate</span>
                            <span class="order-price">Rs. 90</span>
                            <input type="number" class="order-qty" min="1" value="1">
                        </label>
                        <label class="order-option">
                            <input type="checkbox" class="item-check" data-item="Masala Milk" data-price="70">
                            <span class="order-name">Masala Milk</span>
                            <span class="order-price">Rs. 70</span>
                            <input type="number" class="order-qty" min="1" value="1">
                        </label>
                        <label class="order-option">
                            <input type="checkbox" class="item-check" data-item="Green Tea" data-price="55">
                            <span class="order-name">Green Tea</span>
                            <span class="order-price">Rs. 55</span>
                            <input type="number" class="order-qty" min="1" value="1">
                        </label>
                    </div>
                </details>

                <details class="category-box">
                    <summary>Cold Drinks</summary>
                    <div class="order-options">
                        <label class="order-option">
                            <input type="checkbox" class="item-check" data-item="Lemon Juice" data-price="50">
                            <span class="order-name">Lemon Juice</span>
                            <span class="order-price">Rs. 50</span>
                            <input type="number" class="order-qty" min="1" value="1">
                        </label>
                        <label class="order-option">
                            <input type="checkbox" class="item-check" data-item="Mango Shake" data-price="95">
                            <span class="order-name">Mango Shake</span>
                            <span class="order-price">Rs. 95</span>
                            <input type="number" class="order-qty" min="1" value="1">
                        </label>
                        <label class="order-option">
                            <input type="checkbox" class="item-check" data-item="Cold Coffee" data-price="110">
                            <span class="order-name">Cold Coffee</span>
                            <span class="order-price">Rs. 110</span>
                            <input type="number" class="order-qty" min="1" value="1">
                        </label>
                        <label class="order-option">
                            <input type="checkbox" class="item-check" data-item="Fresh Lime Soda" data-price="65">
                            <span class="order-name">Fresh Lime Soda</span>
                            <span class="order-price">Rs. 65</span>
                            <input type="number" class="order-qty" min="1" value="1">
                        </label>
                        <label class="order-option">
                            <input type="checkbox" class="item-check" data-item="Chocolate Milkshake" data-price="120">
                            <span class="order-name">Chocolate Milkshake</span>
                            <span class="order-price">Rs. 120</span>
                            <input type="number" class="order-qty" min="1" value="1">
                        </label>
                    </div>
                </details>

                <button type="submit" style="margin-top: 16px;">Place Order</button>
            </form>

            <section id="billPopup" class="confirm-box hidden">
                <h3>Final Bill</h3>
                <p><strong>Name:</strong> <span id="bName"></span></p>
                <p><strong>Phone:</strong> <span id="bPhone"></span></p>
                <p><strong>Address:</strong> <span id="bAddress"></span></p>
                <p><strong>Payment:</strong> <span id="bPayment"></span></p>
                <p style="margin-top: 10px;"><strong>Bill Amount:</strong> Rs. <span id="bTotal"></span></p>
                <h3 style="margin-top: 14px;">Items</h3>
                <ul id="bItems"></ul>
            </section>
        </section>
    </main>

    <script>
        const orderForm = document.getElementById("orderForm");
        const billPopup = document.getElementById("billPopup");

        const bName = document.getElementById("bName");
        const bPhone = document.getElementById("bPhone");
        const bAddress = document.getElementById("bAddress");
        const bPayment = document.getElementById("bPayment");
        const bTotal = document.getElementById("bTotal");
        const bItems = document.getElementById("bItems");

        function formatINR(amount) {
            return String(amount);
        }

        orderForm.addEventListener("submit", (event) => {
            event.preventDefault();

            const checked = Array.from(document.querySelectorAll(".item-check:checked"));
            if (checked.length === 0) {
                alert("Please select at least one item.");
                return;
            }

            let total = 0;
            const selectedItems = [];

            checked.forEach((cb) => {
                const optionRow = cb.closest(".order-option");
                const qtyInput = optionRow ? optionRow.querySelector(".order-qty") : null;
                const qty = qtyInput ? Math.max(1, Number(qtyInput.value || 1)) : 1;

                const itemName = cb.dataset.item;
                const price = Number(cb.dataset.price);
                const lineTotal = price * qty;

                total += lineTotal;
                selectedItems.push({ itemName, qty, price, lineTotal });
            });

            const name = document.getElementById("customerName").value.trim();
            const phone = document.getElementById("phoneNumber").value.trim();
            const address = document.getElementById("address").value.trim();
            const paymentMethod = document.getElementById("paymentMethod").value;

            if (!paymentMethod) {
                alert("Please select payment method.");
                return;
            }

            bName.textContent = name;
            bPhone.textContent = phone;
            bAddress.textContent = address;
            bPayment.textContent = paymentMethod;
            bTotal.textContent = formatINR(total);

            bItems.innerHTML = "";
            selectedItems.forEach((it) => {
                const li = document.createElement("li");
                li.textContent = `${it.itemName} (x${it.qty}) - Rs. ${it.lineTotal}`;
                bItems.appendChild(li);
            });

            billPopup.classList.remove("hidden");
            billPopup.scrollIntoView({ behavior: "smooth" });
        });
    </script>
</body>
</html>
